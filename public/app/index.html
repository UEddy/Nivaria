<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foresight: Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-grid"></div>
    <canvas id="particle-canvas" class="particle-canvas"></canvas>
  </div>

  <!-- Floating geometric shapes -->
  <div class="geo-shapes" aria-hidden="true">
    <div class="geo-shape geo-circle-1"></div>
    <div class="geo-shape geo-circle-2"></div>
    <div class="geo-shape geo-circle-3"></div>
    <div class="geo-shape geo-hex-1"></div>
    <div class="geo-shape geo-hex-2"></div>
    <div class="geo-shape geo-tri-1"></div>
    <div class="geo-shape geo-tri-2"></div>
  </div>

  <!-- Subtle scanline texture -->
  <div class="scanline-overlay" aria-hidden="true"></div>

  <div class="app-shell" id="app-shell">

    <!-- Mobile drawer scrim. Sibling of sidebar so a tap registers above page
         content but below the sidebar itself. Click handler wired in app.js. -->
    <div class="sidebar-scrim" id="sidebar-scrim" aria-hidden="true"></div>

    <!-- Sidebar — desktop: permanent. Mobile (<768px): off-canvas drawer. -->
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">

      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <div>
          <div class="logo-name">Foresight</div>
          <div class="logo-sub">Intelligence Platform</div>
        </div>
        <!-- Close button — drawer mode only (CSS-hidden on desktop). -->
        <button class="sidebar-close" id="sidebar-close" aria-label="Close menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Overview</div>

        <a href="#/" class="nav-item" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </a>

        <a href="#/competitors" class="nav-item" data-page="competitors">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Competitors</span>
          <span class="nav-badge" id="nav-competitor-count"></span>
        </a>

        <a href="#/history" class="nav-item" data-page="history">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>Change Feed</span>
          <span class="nav-badge nav-badge--alert" id="nav-alert-count"></span>
        </a>

        <a href="#/deals" class="nav-item" data-page="deals">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span>Deals &amp; ROI</span>
        </a>

        <div class="nav-divider"></div>
        <div class="nav-section-label">Account</div>

        <a href="#/settings" class="nav-item" data-page="settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Settings</span>
        </a>

        <a href="#/pricing" class="nav-item" data-page="pricing">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          <span>Plans & Pricing</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="plan-chip" id="plan-chip">
          <span class="plan-dot"></span>
          <span id="plan-name">Pro Plan</span>
        </div>
        <div class="sidebar-user" id="sidebar-user">
          <div class="user-avatar" id="user-avatar">D</div>
          <div class="user-meta">
            <div class="user-name" id="user-name">Demo User</div>
            <div class="user-email" id="user-email">demo@foresight.com</div>
            <a href="#/settings" class="sidebar-manage-link" style="font-size:11px;color:var(--accent);text-decoration:none;opacity:0.85;margin-top:1px;display:inline-block;line-height:1.3" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">Manage account</a>
          </div>
          <button
            class="sidebar-signout"
            onclick="App.logout()"
            title="Sign out"
            style="margin-left:auto;flex-shrink:0;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--txt-3);transition:background 0.14s,color 0.14s;cursor:pointer;border:none;background:none"
            onmouseover="this.style.background='var(--bg-hover)';this.style.color='var(--txt)'"
            onmouseout="this.style.background='none';this.style.color='var(--txt-3)'"
            aria-label="Sign out"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle" type="button"
                  aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 class="page-title" id="page-title">Dashboard</h1>
            <p class="page-sub" id="page-sub">Your competitive intelligence overview</p>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-actions" id="topbar-actions"></div>

          <!-- Live clock -->
          <div class="live-clock-wrap" title="Local time">
            <span class="live-clock" id="live-clock">--:--:--</span>
          </div>

          <!-- Theme toggle -->
          <div class="theme-toggle" id="theme-toggle" role="group" aria-label="Color theme">
            <button class="theme-btn" data-val="light" title="Light mode" aria-label="Light mode" aria-pressed="false">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </button>
            <button class="theme-btn" data-val="system" title="System preference" aria-label="System preference" aria-pressed="false">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
              </svg>
            </button>
            <button class="theme-btn" data-val="dark" title="Dark mode" aria-label="Dark mode" aria-pressed="false">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </button>
          </div>

          <div class="status-indicator" title="System operational">
            <div class="status-dot"></div>
          </div>
        </div>
      </header>

      <main class="page-content" id="page-root">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>Loading...</span>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-container" id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal-box" role="dialog" aria-modal="true">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="/js/animations.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/competitors.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/battlecard.js"></script>
  <script src="/js/competitorDetail.js"></script>
  <script src="/js/deals.js"></script>
  <script src="/js/onboarding.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
